<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEB STORE</title>
    <link rel="stylesheet" href="css/estilo.css" />
  </head>
  <body>
    <aside class="sidebar" aria-hidden="true">
      <div class="sidebar-inner">
        <button id="sidebar-close" class="sidebar-close" aria-label="Cerrar menú">×</button>
        <h2 class="brand">Web Store</h2>
        <nav>
          <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Productos</a></li>
            <li><a href="#">Ofertas</a></li>
            <li><a href="#">Contacto</a></li>
          </ul>
        </nav>
        <footer class="sidebar-footer">&copy; 2025 Web Store</footer>
      </div>
    </aside>

    <div id="overlay" class="overlay" hidden></div>

    <header class="header">
      <button id="hamburger" class="hamburger" aria-label="Abrir menú">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
      <div class="header-brand">WEB STORE</div>
      <div class="header-actions">
        <div class="cart-icon-container">
          <img src="img/store.jpg" alt="icono" />
          <span id="cart-count" class="cart-count">0</span>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="container">
        <section class="catalog">
          <h2>Productos</h2>
          <!-- Las tarjetas de producto se renderizan dinámicamente desde data/products.json -->
          <div class="filas" aria-live="polite"></div>
        </section>

        <aside class="mini-cart" aria-label="Carrito">
          <h3>Carrito</h3>
          <table>
            <thead>
              <tr>
                <th>Imagen</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Cant.</th>
                <th>Acción</th>
              </tr>
            </thead>
            <tbody id="productos"></tbody>
          </table>
          <div class="cart-total">
            <strong>Total: $<span id="total">0</span></strong>
          </div>
          <div class="cart-actions">
            <button id="limpiar" class="btn btn-ghost">Vaciar</button>
          </div>
        </aside>
      </div>
    </main>

    <script src="js/carrito.js"></script>
  </body>
</html>
