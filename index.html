<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEB STORE</title>
    <link rel="stylesheet" href="css/estilo.css" />
  </head>
  <body>
    <header>
      <h1>WEB STORE</h1>
      <div class="menu">
        <div class="cart-icon-container">
          <img src="img/store.jpg" alt="icono" />
          <span id="cart-count" class="cart-count">0</span>
        </div>
        <div class="carrito">
          <table>
            <thead>
              <th>Imagen</th>
              <th>Nombre</th>
              <th>Precio</th>
              <th>Cantidad</th>
              <th>Acción</th>
            </thead>
            <tbody id="productos"></tbody>
          </table>
          <div class="cart-total">
            <strong>Total: $<span id="total">0</span></strong>
          </div>
          <div class="cart-actions">
            <button id="limpiar">Vaciar</button>
          </div>
        </div>
      </div>
    </header>
    <main>
      <h2>Productos</h2>
      <!-- Las tarjetas de producto ahora se renderizan dinámicamente desde data/products.json -->
      <div class="filas"></div>
    </main>
  </body>
  <script src="js/carrito.js"></script>
</html>
